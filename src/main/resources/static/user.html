<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Request | Creative Tool</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container" style="max-width: 600px; padding-top: 4rem;">
    <div class="card">
        <h2 style="font-size: 1.875rem; text-align: center; margin-bottom: 2rem; background: linear-gradient(90deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
            Submit Creative Request
        </h2>
        
        <label style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; margin-bottom: 0.5rem; display: block;">Organisation Name</label>
        <div class="input-group">
            <input id="clubName" placeholder="e.g. Creative Society">
        </div>

        <label style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; margin-bottom: 0.5rem; display: block;">Type of Request</label>
        <div class="input-group">
            <input id="type" placeholder="e.g. Event Poster">
        </div>

        <label style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; margin-bottom: 0.5rem; display: block;">Brief Description</label>
        <div class="input-group">
            <textarea id="desc" placeholder="Details about the request..." rows="4"></textarea>
        </div>

        <label style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; margin-bottom: 0.5rem; display: block;">Deadline Needed</label>
        <div class="input-group">
            <input id="deadline" type="date">
        </div>

        <button onclick="submitRequest()" id="submitBtn" style="width: 100%; margin-top: 1rem; padding: 1rem;">
            Submit Request
        </button>
        <div id="statusMsg" style="text-align: center; margin-top: 1rem; font-size: 0.875rem; transition: all 0.2s;"></div>
    </div>
</div>

<script>
async function submitRequest() {
    const btn = document.getElementById("submitBtn");
    const status = document.getElementById("statusMsg");
    
    status.innerHTML = "";
    btn.innerHTML = `<span style='opacity: 0.7'>Processing...</span>`;
    btn.disabled = true;

    try {
        const response = await fetch("/requests", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                clubName: document.getElementById("clubName").value,
                requestType: document.getElementById("type").value,
                description: document.getElementById("desc").value,
                deadline: document.getElementById("deadline").value
            })
        });

        if (response.ok) {
            status.innerHTML = `<span style="color: var(--success)">✅ Successfully submitted!</span>`;
            document.querySelectorAll("input, textarea").forEach(el => el.value = "");
        } else {
            status.innerHTML = `<span style="color: var(--danger)">❌ Submission failed on server.</span>`;
        }
    } catch (err) {
        status.innerHTML = `<span style="color: var(--danger)">❌ Network error. Check connection.</span>`;
    } finally {
        btn.innerHTML = "Submit Request";
        btn.disabled = false;
    }
}
</script>

</body>
</html>
